name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run unit tests
        run: pytest tests/ -q

  f1_regression:
    name: Retrieval-F1 regression gate (UC-GC-RETRIEVAL)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run F1 benchmark (synthetic, fast)
        run: |
          mkdir -p /tmp/ci_f1
          python experiments/gc_retrieval_f1_benchmark.py \
            --n-memories 200 \
            --n-queries 60 \
            --aged-fraction 0.4 \
            --out /tmp/ci_f1/artifact.json
      - name: Gate on F1 preservation floor
        # Floor of 75% allows aged_fraction=0.4 (which produces ~81% F1
        # preservation on the tuned scaffold). Anything below 75% means
        # a variant or scaffold change degraded retrieval quality.
        run: |
          python experiments/ci_check_f1_regression.py \
            /tmp/ci_f1/artifact.json \
            --min-f1-preservation 75.0
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f1-benchmark-artifact
          path: /tmp/ci_f1/artifact.json
