# customer-conversations profile for gc-v0.2.5-comprehensive-graph-tuned
# Mem0-shape multi-tenant chat workloads. Conversations age out
# moderately; tenant isolation is critical.

component_isolation_enabled: true
min_component_idle_seconds: 1209600      # 14 days
min_component_age_seconds: 86400         # 1 day

temporal_validity_enabled: true
temporal_validity_ttl_seconds: 1209600   # 14 days

activation_decay_enabled: true
activation_window_seconds: 2592000       # 30 days
min_query_count: 2

evidence_count_enabled: true
evidence_min_age_seconds: 604800         # 7 days

supersession_tombstone_enabled: true
tombstone_ttl_seconds: 1209600           # 14 days
supersession_min_age_seconds: 3600       # 1 hour

tenant_pinning_enabled: true
