# local-model-conservative profile for gc-v0.2.5-comprehensive-graph-tuned
# Local 7B-class LLMs (phi3:mini, llama3.1:8b) have noisier extraction.
# Be more conservative across the board to avoid over-collecting from
# extraction artifacts.

component_isolation_enabled: true
min_component_idle_seconds: 7776000      # 90 days (3x default)
min_component_age_seconds: 1209600       # 14 days (2x default)

temporal_validity_enabled: true
temporal_validity_ttl_seconds: 2592000   # 30 days (4x default)

activation_decay_enabled: true
activation_window_seconds: 10368000      # 120 days (2x default)
min_query_count: 5                       # higher floor to ignore extraction noise

evidence_count_enabled: true
evidence_min_age_seconds: 7776000        # 90 days (3x default)

supersession_tombstone_enabled: true
tombstone_ttl_seconds: 2592000           # 30 days
supersession_min_age_seconds: 604800     # 7 days

tenant_pinning_enabled: true
